apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-api
  namespace: production
  labels:
    app: enterprise-api
    version: "1.0.0"
spec:
  replicas: 2                          # Start with 2 on VPS — scale up as needed
  selector:
    matchLabels:
      app: enterprise-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0                # Zero-downtime deploys

  template:
    metadata:
      labels:
        app: enterprise-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: enterprise-api-sa
      terminationGracePeriodSeconds: 60

      # K3s NOTE: Uses containerd, not Docker — images must be pushed to a registry
      # or pre-loaded with: k3s ctr images import image.tar

      containers:
        - name: api
          image: localhost:5000/enterprise-api:latest  # Local registry on VPS
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http

          envFrom:
            - secretRef:
                name: enterprise-api-secrets
            - configMapRef:
                name: enterprise-api-config

          # ── LIVENESS PROBE ──────────────────────────────
          # K8s/K3s restarts pod if this fails 3 consecutive times
          # Only checks process health — no external deps
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── READINESS PROBE ─────────────────────────────
          # Removes pod from service endpoints if this fails
          # Checks DB, Unleash, disk — all dependencies
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 2

          # ── STARTUP PROBE ───────────────────────────────
          # Prevents liveness killing slow-starting pods
          # Allows up to 5 minutes (30 * 10s) to start
          startupProbe:
            httpGet:
              path: /health/live
              port: 3001
            failureThreshold: 30
            periodSeconds: 10

          # Resource limits tuned for Contabo VPS (16–18GB RAM plans)
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"

---
# ── SERVICE ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: enterprise-api
  namespace: production
spec:
  selector:
    app: enterprise-api
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP

---
# ── CONFIGMAP ───────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: enterprise-api-config
  namespace: production
data:
  NODE_ENV: "production"
  PORT: "3001"
  FEATURE_AUDIT: "true"
  FEATURE_NOTIFICATIONS: "false"
  OTEL_SERVICE_NAME: "enterprise-api"

---
# ── HPA — scale on CPU ──────────────────────────────────
# NOTE: K3s includes metrics-server by default — HPA works out of the box
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: enterprise-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: enterprise-api
  minReplicas: 2
  maxReplicas: 6                       # Capped for single VPS resource limits
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── POD DISRUPTION BUDGET ────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: enterprise-api-pdb
  namespace: production
spec:
  minAvailable: 1                      # Always keep 1 pod up during node drain/upgrades
  selector:
    matchLabels:
      app: enterprise-api
